name: rune_cupertino
description: Cupertino (iOS-style) bridge for the rune package; registers CupertinoButton, CupertinoPageScaffold, and other Cupertino widgets plus CupertinoThemeData and CupertinoIcons on a RuneConfig.
version: 0.1.1
repository: https://github.com/CanArslanDev/rune/tree/main/packages/rune_cupertino
homepage: https://github.com/CanArslanDev/rune
issue_tracker: https://github.com/CanArslanDev/rune/issues
documentation: https://canarslandev.github.io/rune/
topics:
  - rune
  - bridge
  - cupertino
  - ios
  - widgets

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  rune:
    path: ../..

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0
