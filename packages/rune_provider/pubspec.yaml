name: rune_provider
description: Provider (provider package) bridge for the rune package; registers ChangeNotifierProvider, Consumer, and Selector widgets on a RuneConfig for reactive state in source strings.
version: 0.1.0
repository: https://github.com/CanArslanDev/rune/tree/main/packages/rune_provider
homepage: https://github.com/CanArslanDev/rune
issue_tracker: https://github.com/CanArslanDev/rune/issues
topics:
  - rune
  - bridge
  - provider
  - state-management
  - reactive

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  rune: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0

dependency_overrides:
  rune:
    path: ../..
