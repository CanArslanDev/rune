name: rune_http
description: HTTP source-fetching bridge for the rune package. RuneHttpView fetches Rune source strings from a URL, caches them in memory, and renders through RuneView with offline-first fallbacks.
version: 0.1.0
repository: https://github.com/CanArslanDev/rune/tree/main/packages/rune_http
homepage: https://github.com/CanArslanDev/rune
issue_tracker: https://github.com/CanArslanDev/rune/issues
topics:
  - rune
  - bridge
  - http
  - server-driven-ui
  - cache

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  rune: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0

dependency_overrides:
  rune:
    path: ../..
