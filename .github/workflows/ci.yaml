name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - flutter-version: "3.24.0"
            flutter-channel: stable
            label: floor
          - flutter-version: ""
            flutter-channel: stable
            label: stable
    name: test (${{ matrix.label }})
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install root dependencies
        run: flutter pub get

      - name: Analyze root package
        run: flutter analyze

      - name: Test root package (with coverage)
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: matrix.label == 'floor'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: root
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Install rune_responsive_sizer dependencies
        working-directory: packages/rune_responsive_sizer
        run: flutter pub get

      - name: Analyze rune_responsive_sizer
        working-directory: packages/rune_responsive_sizer
        run: flutter analyze

      - name: Test rune_responsive_sizer
        working-directory: packages/rune_responsive_sizer
        run: flutter test

      - name: Install rune_cupertino dependencies
        working-directory: packages/rune_cupertino
        run: flutter pub get

      - name: Analyze rune_cupertino
        working-directory: packages/rune_cupertino
        run: flutter analyze

      - name: Test rune_cupertino
        working-directory: packages/rune_cupertino
        run: flutter test

      - name: Install rune_provider dependencies
        working-directory: packages/rune_provider
        run: flutter pub get

      - name: Analyze rune_provider
        working-directory: packages/rune_provider
        run: flutter analyze

      - name: Test rune_provider
        working-directory: packages/rune_provider
        run: flutter test

      - name: Install rune_router dependencies
        working-directory: packages/rune_router
        run: flutter pub get

      - name: Analyze rune_router
        working-directory: packages/rune_router
        run: flutter analyze

      - name: Test rune_router
        working-directory: packages/rune_router
        run: flutter test

      - name: Install rune_http dependencies
        working-directory: packages/rune_http
        run: flutter pub get

      - name: Analyze rune_http
        working-directory: packages/rune_http
        run: flutter analyze

      - name: Test rune_http
        working-directory: packages/rune_http
        run: flutter test

      - name: Install rune_bloc dependencies
        working-directory: packages/rune_bloc
        run: flutter pub get

      - name: Analyze rune_bloc
        working-directory: packages/rune_bloc
        run: flutter analyze

      - name: Test rune_bloc
        working-directory: packages/rune_bloc
        run: flutter test

      - name: Install rune_riverpod dependencies
        working-directory: packages/rune_riverpod
        run: flutter pub get

      - name: Analyze rune_riverpod
        working-directory: packages/rune_riverpod
        run: flutter analyze

      - name: Test rune_riverpod
        working-directory: packages/rune_riverpod
        run: flutter test

      - name: Install rune_lint dependencies
        working-directory: packages/rune_lint
        run: flutter pub get

      - name: Analyze rune_lint
        working-directory: packages/rune_lint
        run: flutter analyze

      - name: Test rune_lint
        working-directory: packages/rune_lint
        run: flutter test

      # rune_devtools_extension depends on devtools_extensions ^0.3.0,
      # which requires Dart >= 3.6 (Flutter 3.27+). The pinned-floor
      # column still runs on Flutter 3.24.0 (Dart 3.5) for main-package
      # backwards-compat, so we limit the extension-package steps to
      # the stable column. The main `rune` package stays covered on
      # both columns; only this dev-tooling sibling is stable-only.
      - name: Install rune_devtools_extension dependencies
        if: matrix.label == 'stable'
        working-directory: packages/rune_devtools_extension
        run: flutter pub get

      - name: Analyze rune_devtools_extension
        if: matrix.label == 'stable'
        working-directory: packages/rune_devtools_extension
        run: flutter analyze

      - name: Test rune_devtools_extension
        if: matrix.label == 'stable'
        working-directory: packages/rune_devtools_extension
        run: flutter test
