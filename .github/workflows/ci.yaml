name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install root dependencies
        run: flutter pub get

      - name: Analyze root package
        run: flutter analyze

      - name: Test root package
        run: flutter test

      - name: Install rune_responsive_sizer dependencies
        working-directory: packages/rune_responsive_sizer
        run: flutter pub get

      - name: Analyze rune_responsive_sizer
        working-directory: packages/rune_responsive_sizer
        run: flutter analyze

      - name: Test rune_responsive_sizer
        working-directory: packages/rune_responsive_sizer
        run: flutter test

      - name: Install rune_cupertino dependencies
        working-directory: packages/rune_cupertino
        run: flutter pub get

      - name: Analyze rune_cupertino
        working-directory: packages/rune_cupertino
        run: flutter analyze

      - name: Test rune_cupertino
        working-directory: packages/rune_cupertino
        run: flutter test

      - name: Install rune_provider dependencies
        working-directory: packages/rune_provider
        run: flutter pub get

      - name: Analyze rune_provider
        working-directory: packages/rune_provider
        run: flutter analyze

      - name: Test rune_provider
        working-directory: packages/rune_provider
        run: flutter test
